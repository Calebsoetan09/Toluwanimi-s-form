<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Log in - T&J's</title>
        <link rel="stylesheet" href="form.css">
        <script src="form.js" defer></script>
    </head>

    <body>
        <section class="login-section">
            <header class = "form-header">
                <div class="logo">
                    <div class="one">T&J's</div>
                    <div class="two">cafe</div>
                </div>

                <div class="title">T&J's Cafe Login Form</div>
            </header>

            <div class="message">Fill in all necessary details and submit when done , Thank you</div>
    
            <form class="login-section-container">
                <div class="email-username">
                    <div class="sub-title">Email/Username </div>
                    <input type="text" id="user-email-input" placeholder="Enter your Username or Email here.....">
                </div>

                <div class="password">
                    <div class="sub-title"> Password</div>
                    <input type="password" id="password-input" placeholder="Enter your password in here....">
                </div>
    
                <div class="button-link">
                    <button type="button" id="submit-button">Submit</button>
                    <a class="sign-up" href="signup.html">Do not have an account?</a>                
                </div>
            </form>

            
            <div class="messages">
                <div class="error"></div>
                <div class="success"></div>
            </div>
        </section>
    </body>
</html>
